name: Bootstrap repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, 'bootstrap source archive') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared source archive
        run: |
          curl -fsSL 'https://exposed-port-8140-0f61795f7a08cb00c92b-vh6v7rj2oe.h68.openclaw.agent37.com/github-star-atlas-source.tar' -o /tmp/github-star-atlas-source.tar
          tar -xf /tmp/github-star-atlas-source.tar -C .
          rm -f public/github-star-atlas-source.tar public/github-star-atlas-source.tar.gz

      - name: Commit source archive contents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bootstrap source archive" || exit 0
          git push
